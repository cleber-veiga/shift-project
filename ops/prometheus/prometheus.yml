# Prometheus scrape config para o stack Docker Compose do Shift.
#
# - Scrape a cada 15s (suficiente para os Histograms granulares; baixar
#   para 5s gera muitos samples sem ganho real).
# - Carrega regras de alerta de /etc/prometheus/alerts/, montado a partir
#   de ops/alerts/ no host.
# - Targets usam nomes de service do compose (rede shift-net, DNS interno).
#
# Para rodar fora do compose (ex: backend local em host.docker.internal),
# editar os ``targets`` abaixo. Nunca expor :9090 em producao.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts/*.yml

scrape_configs:
  - job_name: shift-backend
    metrics_path: /metrics
    static_configs:
      - targets:
          - shift-backend:8000
        labels:
          service: shift-backend
          env: local
    # Mitigacao de cardinalidade — drop label ``workspace_id`` em
    # metricas onde top-N agregado e suficiente. As metricas com
    # workspace_id mantidas: execution_duration_seconds,
    # shift_executions_total, db_pool_*. Para detalhe por workspace
    # use as recording rules em recording-rules-aggregation.yml.
    metric_relabel_configs:
      # Em deploy >1k workspaces, descomente para reduzir cardinalidade.
      # - source_labels: [__name__]
      #   regex: '^node_(duration_seconds_bucket|rows_processed|errors_total).*'
      #   action: labeldrop
      #   replacement: 'workspace_id'

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: tempo
    static_configs:
      - targets: ['tempo:3200']
        labels:
          service: tempo

  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8888']
        labels:
          service: otel-collector
