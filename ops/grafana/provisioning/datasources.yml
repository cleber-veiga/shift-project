# Provisionamento automatico do datasource Prometheus do Shift.
#
# Em deploys reais, a URL pode vir de variavel de ambiente — Grafana suporta
# substituicao via $__env{} desde 9.x. Aqui usamos o nome de service do
# docker-compose como default.

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    jsonData:
      httpMethod: POST
      timeInterval: "15s"
      # Liga exemplars a traces no Tempo. Quando shift-backend gerar
      # exemplars (Histogram com OTel context), aparece um botao
      # "Trace" inline no painel de metricas.
      exemplarTraceIdDestinations:
        - name: trace_id
          datasourceUid: tempo

  - name: Tempo
    type: tempo
    uid: tempo
    access: proxy
    url: http://tempo:3200
    jsonData:
      httpMethod: GET
      tracesToLogsV2:
        datasourceUid: prometheus
        spanStartTimeShift: '-1h'
        spanEndTimeShift: '1h'
      tracesToMetrics:
        datasourceUid: prometheus
      serviceMap:
        datasourceUid: prometheus
      nodeGraph:
        enabled: true
