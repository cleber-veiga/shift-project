# Provisionamento automatico do datasource Prometheus do Shift.
#
# Em deploys reais, a URL pode vir de variavel de ambiente — Grafana suporta
# substituicao via $__env{} desde 9.x. Aqui usamos o nome de service do
# docker-compose como default.

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    jsonData:
      httpMethod: POST
      timeInterval: "15s"
