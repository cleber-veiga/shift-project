# Shift — stack para teste local.
#
# Este compose NAO builda nada — puxa imagens prontas do Docker Hub
# (cleberveiga/*).
#
# Setup basico (Cenarios B e C):
#   1) cp .env.example .env       # editar com sua DATABASE_URL
#   2) docker compose pull
#   3) docker compose up -d
#   4) abra http://localhost:3000
#
# Banco de dados (Postgres) NAO sobe aqui — voce recebeu uma DATABASE_URL.
#
# Firebird — 3 cenarios:
#   A) BUNDLED (voce tem so o arquivo .fdb, sem servidor Firebird):
#      A Shift sobe FB 2.5 e 3.0 em containers. Use o compose adicional:
#        docker compose -f docker-compose.yml -f docker-compose.firebird.yml up -d
#      Veja docker-compose.firebird.yml e o README.
#
#   B) FB rodando no SEU HOST (Windows/macOS/Linux com Firebird Server):
#      Ja funciona com este compose. No UI, ao criar Connection, use:
#        host = host.docker.internal
#        port = 3050
#
#   C) FB em SERVIDOR REMOTO na rede:
#      Ja funciona. No UI, use o IP/hostname do servidor.

name: shift

services:

  # One-shot: existe so para `docker compose pull` baixar a imagem
  # da sandbox de codigo. Nao roda como servico.
  kernel-runtime:
    image: cleberveiga/shift-kernel-runtime:latest
    entrypoint: ["true"]
    restart: "no"

  shift-backend:
    image: cleberveiga/shift-backend:latest
    pull_policy: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL obrigatorio em .env}
      # SECRET_KEY (JWT) e ENCRYPTION_KEY (Fernet) sao geradas
      # automaticamente no primeiro boot e persistidas no volume
      # nomeado `shift_secrets`. Nao precisa setar nada no .env.
      SECRET_KEY: ${SECRET_KEY:-}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}

      LOG_FORMAT: ${LOG_FORMAT:-json}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

      FRONTEND_BASE_URL: http://localhost:3000
      EXTERNAL_BASE_URL: http://localhost:8000

      EMAIL_BACKEND: console

      # Tracing OFF para teste — nao precisa de otel-collector/tempo/grafana
      SHIFT_TRACING_ENABLED: "false"

      # Sandbox usa imagem do Docker Hub (puxada pelo servico kernel-runtime)
      SANDBOX_ENABLED: ${SANDBOX_ENABLED:-true}
      SANDBOX_IMAGE: cleberveiga/shift-kernel-runtime:latest
      SANDBOX_DEFAULT_CPU_QUOTA: 1.0
      SANDBOX_DEFAULT_MEM_LIMIT_MB: 512
      SANDBOX_DEFAULT_TIMEOUT_S: 60
      SANDBOX_POOL_ENABLED: "true"
      SANDBOX_POOL_TARGET_IDLE: 2
      SANDBOX_POOL_MAX_SIZE: 8

      STREAMING_MAX_IN_MEMORY_CHUNKS: 4
      STREAMING_SPILL_WHEN_EXCEEDED: "true"
      STREAMING_SPILL_DIR: /tmp/streaming-spill

      SHIFT_CHECKPOINT_DIR: /var/lib/shift/checkpoints
      SHIFT_EXTRACT_CACHE_DIR: /var/lib/shift/extract-cache
      WORKFLOW_UPLOAD_DIR: /var/lib/shift/uploads

      DLT_DEFAULT_DESTINATION: postgres

      # LLM e OAuth: chaves e modelos sao embutidos na imagem da Shift
      # (/etc/shift/embedded.env). Cliente nao precisa configurar nada.
      AGENT_ENABLED: ${AGENT_ENABLED:-false}
    volumes:
      # Sandbox precisa do socket Docker para criar containers efemeros
      - /var/run/docker.sock:/var/run/docker.sock
      - shift_checkpoints:/var/lib/shift/checkpoints
      - shift_extract_cache:/var/lib/shift/extract-cache
      - shift_uploads:/var/lib/shift/uploads
      # Persistencia das chaves auto-geradas (SECRET_KEY, ENCRYPTION_KEY).
      # Sobrevive a `docker compose down`; so e apagado com `down -v`.
      # NUNCA apagar manualmente — invalida credenciais criptografadas.
      - shift_secrets:/shift-secrets
      - streaming_spill:/tmp/streaming-spill
    # Cenario B (FB no Windows host): em Linux nativo o host.docker.internal
    # nao resolve sem isso; no Docker Desktop ja resolve, mas deixar nao
    # atrapalha. Permite conectar em FB Server rodando no host via
    # host.docker.internal:3050.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Linux/WSL2: GID do grupo dono do /var/run/docker.sock (default 999).
    # No Docker Desktop Windows/macOS nativo, geralmente nao e necessario,
    # mas deixar nao atrapalha.
    group_add:
      - "${DOCKER_GID:-999}"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 60s
    restart: unless-stopped
    mem_limit: 2g
    networks: [shift-net]

  shift-frontend:
    image: cleberveiga/shift-frontend:latest
    pull_policy: always
    depends_on:
      shift-backend:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      # Tem que bater com NEXT_PUBLIC_API_BASE_URL usado no build da imagem
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    restart: unless-stopped
    mem_limit: 512m
    networks: [shift-net]

volumes:
  shift_checkpoints:
  shift_extract_cache:
  shift_uploads:
  shift_secrets:
  streaming_spill:
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=2g,uid=1000,gid=1000"

networks:
  shift-net:
    driver: bridge
    name: shift-net
