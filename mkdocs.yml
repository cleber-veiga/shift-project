site_name: Shift - Documentação
site_description: Plataforma de integração, migração e automação de dados
site_author: Equipe Shift
site_url: https://cleber-veiga.github.io/shift-project/
repo_url: https://github.com/cleber-veiga/shift-project
repo_name: cleber-veiga/shift-project
edit_uri: edit/main/docs/
docs_dir: docs
dev_addr: 127.0.0.1:8001

theme:
  name: material
  language: pt-BR
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Mudar para modo escuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Mudar para modo claro
  font:
    text: Geist
    code: Geist Mono
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/shift-theme.css

plugins:
  - search:
      lang:
        - pt
        - en
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      width: 100%
      height: auto
      zoomable: true
      draggable: false
  - mkdocs-video:
      is_video: true
      video_autoplay: false
      video_controls: true

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      permalink_title: Link para esta seção
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

nav:
  - Início: index.md
  - Arquitetura:
      - Agente Shift - Funcionamento: agente-shift-funcionamento.md
      - Variáveis e Connection Mapping: variables-e-connection-mapping.md
      - Planejamento DLT (Extração/Inserção): planejamento-dlt-extracao-insercao.md
  - Nós:
      - Gatilhos:
          - Manual: users/nodes/manual.md
          - Agendamento: users/nodes/agendamento.md
          - Webhook: users/nodes/webhook.md
          - Entrada do Fluxo: users/nodes/entrada_do_fluxo.md
      - Entradas:
          - CSV: users/nodes/csv.md
          - Excel: users/nodes/excel.md
          - HTTP Request: users/nodes/http_request.md
      - Transformação:
          - Sort: users/nodes/sort.md
          - Sample: users/nodes/sample.md
          - Record ID: users/nodes/record_id.md
          - Union: users/nodes/union.md
          - Pivot: users/nodes/pivot.md
          - Unpivot: users/nodes/unpivot.md
          - Text to Rows: users/nodes/text_to_rows.md
  - Deploy:
      - Firebird: firebird-deployment.md
  - Benchmarks:
      - Sandbox Pool: benchmarks/sandbox_pool.md
      - Streaming Partition: benchmarks/streaming_partition.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/
  generator: false

copyright: Copyright &copy; 2026 Shift
