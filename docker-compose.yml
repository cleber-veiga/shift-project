# Docker Compose principal do shift-project.
#
# Stack:
#   shift-backend       — FastAPI + APScheduler in-process (single-process,
#                         single-worker porque APScheduler nao pode rodar em
#                         multiplos workers do mesmo processo)
#   shift-frontend      — Next.js 16
#   prometheus          — metricas
#   grafana             — dashboards (provisionados de ops/grafana/)
#   otel-collector      — recebe spans OTLP do backend
#   tempo               — backend de traces, integrado no Grafana
#   kernel-runtime-builder — service one-shot que builda a imagem
#                            shift-kernel-runtime:latest, usada pela sandbox
#                            de code_node. Roda com --profile build.
#
# IMPORTANTE: nao tem Celery worker nem Celery beat. O codigo atual usa
# APScheduler in-process; webhook dispatch, cleanup de checkpoints,
# extract-cache, agent expiration — tudo registrado como job APScheduler
# no startup do FastAPI (main.py:lifespan). Para escalar horizontalmente,
# suba multiplas replicas do shift-backend — APScheduler+SQLAlchemyJobStore
# coordena via locks no Postgres (job_default_max_instances=1).
#
# Nao ha orquestrador externo. A execucao de workflows roda em
# orchestration/flows/dynamic_runner.py em asyncio puro, dentro do
# proprio processo do shift-backend.

name: shift

# ---------------------------------------------------------------------------
# Anchors reutilizaveis
# ---------------------------------------------------------------------------
x-backend-env: &backend-env
  # === Database (Postgres em nuvem) ===
  # DATABASE_URL e fornecido via .env. Formato esperado:
  #   postgresql+asyncpg://USER:PASS@HOST:5432/DB?sslmode=require
  # ?sslmode=require funciona para asyncpg (assincrono, runtime) E para
  # psycopg2 (sincrono, alembic) — SQLAlchemy traduz por driver.
  DATABASE_URL: ${DATABASE_URL:?DATABASE_URL obrigatorio em .env (Postgres em nuvem)}

  # === Logging ===
  LOG_FORMAT: ${LOG_FORMAT:-json}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}

  # === Auth / Crypto ===
  # SECRET_KEY (JWT) e ENCRYPTION_KEY (Fernet) sao geradas automaticamente
  # pelo bootstrap-secrets.py na primeira subida e gravadas em
  # /shift-secrets/secrets.env (volume nomeado `shift_secrets`). Setar
  # via env var aqui apenas em dev local com .env explicito; em prod,
  # deixar vazias e deixar o bootstrap fazer.
  SECRET_KEY: ${SECRET_KEY:-}
  ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
  ALGORITHM: HS256
  ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}

  # === dlt ===
  DLT_DEFAULT_DESTINATION: ${DLT_DEFAULT_DESTINATION:-postgres}

  # === Email / Frontend ===
  EMAIL_BACKEND: ${EMAIL_BACKEND:-console}
  FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:3000}
  EXTERNAL_BASE_URL: ${EXTERNAL_BASE_URL:-http://localhost:8000}

  # === Tracing (OTel) ===
  SHIFT_TRACING_ENABLED: ${SHIFT_TRACING_ENABLED:-true}
  OTEL_SERVICE_NAME: shift-backend
  # Path /v1/traces e obrigatorio quando o codigo passa endpoint via
  # parametro do OTLPSpanExporter (a SDK nao auto-anexa nesse caminho).
  # Ver shift-backend/app/core/observability/tracing.py:119.
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318/v1/traces
  OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf

  # === Sandbox (Docker) ===
  SANDBOX_ENABLED: ${SANDBOX_ENABLED:-true}
  SANDBOX_IMAGE: ${SANDBOX_IMAGE:-shift-kernel-runtime:latest}
  SANDBOX_DEFAULT_CPU_QUOTA: ${SANDBOX_DEFAULT_CPU_QUOTA:-1.0}
  SANDBOX_DEFAULT_MEM_LIMIT_MB: ${SANDBOX_DEFAULT_MEM_LIMIT_MB:-512}
  SANDBOX_DEFAULT_TIMEOUT_S: ${SANDBOX_DEFAULT_TIMEOUT_S:-60}
  SANDBOX_POOL_ENABLED: ${SANDBOX_POOL_ENABLED:-true}
  SANDBOX_POOL_TARGET_IDLE: ${SANDBOX_POOL_TARGET_IDLE:-2}
  SANDBOX_POOL_MAX_SIZE: ${SANDBOX_POOL_MAX_SIZE:-8}

  # === Streaming / spill ===
  STREAMING_MAX_IN_MEMORY_CHUNKS: ${STREAMING_MAX_IN_MEMORY_CHUNKS:-4}
  STREAMING_SPILL_WHEN_EXCEEDED: ${STREAMING_SPILL_WHEN_EXCEEDED:-true}
  STREAMING_SPILL_DIR: /tmp/streaming-spill

  # === Persistencia (volumes nomeados) ===
  SHIFT_CHECKPOINT_DIR: /var/lib/shift/checkpoints
  SHIFT_EXTRACT_CACHE_DIR: /var/lib/shift/extract-cache
  WORKFLOW_UPLOAD_DIR: /var/lib/shift/uploads

  # === LLM / Agent ===
  # Modelos sao iguais para todos os clientes — hardcoded.
  # LLM_API_KEY e injetada na imagem pela CI da Shift via build-arg
  # (gravada em /etc/shift/embedded.env). Cliente nao define no .env.
  LLM_MODEL: anthropic/claude-sonnet-4-20250514
  AGENT_LLM_MODEL: anthropic/claude-sonnet-4-20250514
  AGENT_ENABLED: ${AGENT_ENABLED:-false}
  LLM_API_KEY: ${LLM_API_KEY:-}

  # === Google OAuth ===
  # GOOGLE_CLIENT_ID embutido na imagem (mesma OAuth app pra todos).
  GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}

  # === LangSmith (opcional) ===
  # LANGSMITH_API_KEY embutida na imagem (chave da Shift).
  LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
  LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-shift-platform-agent}
  LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}

  # === Email (Resend) ===
  # RESEND_API_KEY e EMAIL_FROM embutidas na imagem (servico da Shift).
  RESEND_API_KEY: ${RESEND_API_KEY:-}
  EMAIL_FROM: ${EMAIL_FROM:-}

  # === Firebird (passa o mount root do host para o backend) ===
  # Permite que translate_host_path_to_container converta o caminho que o
  # usuario digita (ex: C:\Shift\Data\X.FDB) para o caminho dentro do
  # container (/firebird/data/X.FDB), independente de o mount estar na
  # raiz de um drive ou em subpasta.
  FIREBIRD_HOST_MOUNT_ROOT: ${FIREBIRD_LEGACY_DATA_DIR:-./firebird-data}

# ---------------------------------------------------------------------------
# Services
# ---------------------------------------------------------------------------
services:

  # =========================================================================
  # kernel-runtime-builder — one-shot. Build da imagem da sandbox.
  # Use: docker compose --profile build build kernel-runtime-builder
  # =========================================================================
  kernel-runtime-builder:
    profiles: ["build"]
    build:
      context: ./kernel-runtime
      dockerfile: Dockerfile
    image: ${SANDBOX_IMAGE:-shift-kernel-runtime:latest}
    # Servico nao roda — so existe para o Compose buildar a imagem com
    # o nome exato que o backend espera em SANDBOX_IMAGE.
    entrypoint: ["true"]
    restart: "no"

  # =========================================================================
  # firebird25 — servidor Firebird 2.5 embutido (legado).
  #
  # Por que existe: o Shift e um migrador. Bancos de origem vem de ERPs
  # antigos (Viasoft, Linx, etc) frequentemente em FB 2.5 (ODS 11.2). O
  # servidor FB 3.0+/4 que o cliente costuma ter instalado se RECUSA a
  # abrir ODS 11.2 — comportamento documentado da Firebird, nao tem driver
  # client que contorne. Solucao: o Shift traz um FB 2.5 server proprio.
  #
  # Como usar: o cliente coloca o .fdb em FIREBIRD_LEGACY_DATA_DIR (no
  # .env, default ./firebird-data). Esse diretorio e bind-montado em
  # /firebird/data dentro deste container, e fica acessivel ao shift-backend
  # via DNS interno do compose (host=firebird25, port=3050). Tambem expoe
  # 3051 no host pra debug com DBeaver/IBExpert.
  #
  # Profile "firebird-legacy" — so sobe quando o cliente tem fontes legadas.
  # Para ativar: docker compose --profile firebird-legacy up -d
  # =========================================================================
  firebird25:
    profiles: ["firebird-legacy"]
    image: jacobalberty/firebird:2.5-ss
    environment:
      # Senha do SYSDBA — em prod sobrescrever via .env.
      ISC_PASSWORD: ${FIREBIRD_LEGACY_PASSWORD:-masterkey}
      # Aceita o EULA da imagem (obrigatorio para 2.5-ss).
      EnableLegacyClientAuth: "true"
    volumes:
      # Bind do diretorio do host com os .fdb dos clientes — o caminho do
      # arquivo no container fica /firebird/data/<nome>.FDB.
      - "${FIREBIRD_LEGACY_DATA_DIR:-./firebird-data}:/firebird/data"
    ports:
      # Expoe so para debug local. Em prod, comentar — backend conecta via
      # rede interna do compose (firebird25:3050) e nao precisa de port
      # mapping no host.
      - "3051:3050"
    # Healthcheck via TCP probe (bash builtin /dev/tcp). Nao depende de
    # employee.fdb existir no bind-mount nem de senha — so valida que o
    # processo Firebird esta aceitando conexoes na 3050. A imagem
    # jacobalberty/firebird:2.5-ss e baseada em phusion/baseimage (Ubuntu)
    # e tem bash, entao /dev/tcp funciona.
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/3050' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    mem_limit: 256m
    networks: [shift-net]

  # =========================================================================
  # firebird30 — servidor Firebird 3.0 (para FB 3.0 files com servidor
  # cliente em FB 4+ que nao quer fazer attach por algum motivo).
  # Mesma ideia do firebird25 — opcional, profile "firebird-legacy".
  # =========================================================================
  firebird30:
    profiles: ["firebird-legacy"]
    image: jacobalberty/firebird:v3.0.10
    environment:
      ISC_PASSWORD: ${FIREBIRD_LEGACY_PASSWORD:-masterkey}
    volumes:
      - "${FIREBIRD_LEGACY_DATA_DIR:-./firebird-data}:/firebird/data"
    ports:
      - "3052:3050"
    # Mesmo TCP probe do firebird25 — ver comentario acima.
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/3050' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    mem_limit: 256m
    networks: [shift-net]

  # =========================================================================
  # shift-backend — FastAPI + APScheduler in-process
  # =========================================================================
  shift-backend:
    build:
      context: ./shift-backend
      dockerfile: Dockerfile
    image: shift-backend:latest
    depends_on:
      otel-collector:
        condition: service_started
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      <<: *backend-env
    volumes:
      # Sandbox precisa do socket Docker — mount read-write porque
      # docker-py cria/destroi containers. Em prod-real, trocar por
      # Sysbox/gVisor/Kata. Documentado no README-DEPLOY.
      - /var/run/docker.sock:/var/run/docker.sock
      # Acesso aos arquivos .fdb dos clientes (mesma mount dos servidores
      # firebird25/firebird30). Read-only — backend so precisa LER o header
      # do arquivo para detectar ODS e decidir qual servidor bundled usar.
      # Os servidores Firebird (que escrevem/leem) tem mount read-write proprio.
      - "${FIREBIRD_LEGACY_DATA_DIR:-./firebird-data}:/firebird/data:ro"
      # Persistencia da plataforma
      - shift_checkpoints:/var/lib/shift/checkpoints
      - shift_extract_cache:/var/lib/shift/extract-cache
      - shift_uploads:/var/lib/shift/uploads
      # Segredos auto-gerados (SECRET_KEY/ENCRYPTION_KEY). Persiste entre
      # `docker compose down` e `up`; so e destruido com `down -v`. NUNCA
      # apagar manualmente em prod — invalida credenciais criptografadas.
      - shift_secrets:/shift-secrets
      # Spill de streaming — tmpfs para nao tocar disco
      - streaming_spill:/tmp/streaming-spill
    # GID do grupo dono do docker.sock no host. No Linux/WSL2 tipicamente
    # 999 (Debian/Ubuntu). Override em .env via DOCKER_GID se diferente.
    group_add:
      - "${DOCKER_GID:-999}"
    # 'host-gateway' e uma sentinela do Docker (>=20.10) que resolve para o
    # IP do host. Em Docker Desktop, host.docker.internal ja resolve sozinho;
    # em Docker Engine puro (WSL2 / Linux nativo) NAO resolve sem isso. Aqui
    # garantimos o mesmo nome em todos os ambientes — backend conecta em
    # servidores Firebird/SQL Server rodando no Windows host via
    # host.docker.internal:3050.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      # Pre-warm de 2 sandboxes leva ~10s, migrations alembic mais alguns.
      start_period: 60s
    restart: unless-stopped
    mem_limit: 2g
    networks: [shift-net]

  # =========================================================================
  # shift-frontend — Next.js 16
  # =========================================================================
  shift-frontend:
    build:
      context: ./shift-frontend
      dockerfile: Dockerfile
      args:
        # Burned no build (NEXT_PUBLIC_*). Trocar antes do build em prod.
        # IMPORTANTE: o codigo do frontend usa NEXT_PUBLIC_API_BASE_URL
        # com sufixo /api/v1 — ver shift-frontend/lib/auth.ts e similares.
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
    image: shift-frontend:latest
    depends_on:
      shift-backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
    restart: unless-stopped
    mem_limit: 512m
    networks: [shift-net]

  # =========================================================================
  # Prometheus — scrape de /metrics do backend + alertas
  # =========================================================================
  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
      - --web.enable-remote-write-receiver
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./ops/alerts:/etc/prometheus/alerts:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    mem_limit: 512m
    networks: [shift-net]

  # =========================================================================
  # Grafana — dashboards e UI de Tempo/Prometheus
  # =========================================================================
  grafana:
    image: grafana/grafana:11.3.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_INSTALL_PLUGINS: ""
      # Habilita features de tracing/exemplars que dependem de feature flags.
      GF_FEATURE_TOGGLES_ENABLE: "traceqlEditor,traceToProfiles"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/grafana/dashboards:/etc/grafana/dashboards:ro
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    mem_limit: 384m
    networks: [shift-net]

  # =========================================================================
  # OTel Collector — recebe traces do backend, exporta pro Tempo
  # =========================================================================
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.112.0
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./ops/otel-collector/otel-collector-config.yml:/etc/otelcol-contrib/config.yaml:ro
    # Portas:
    #   4317 OTLP/gRPC, 4318 OTLP/HTTP, 8888 metrics do collector
    # NAO exponho pra host — backend acessa via DNS interno do compose.
    expose:
      - "4317"
      - "4318"
      - "8888"
    depends_on:
      tempo:
        condition: service_started
    restart: unless-stopped
    mem_limit: 384m
    networks: [shift-net]

  # =========================================================================
  # Tempo — backend de traces (storage local, retencao 24h)
  # =========================================================================
  tempo:
    image: grafana/tempo:2.6.1
    command: ["-config.file=/etc/tempo.yml"]
    volumes:
      - ./ops/tempo/tempo.yml:/etc/tempo.yml:ro
      - tempo_data:/var/tempo
    expose:
      - "3200"   # HTTP API (Grafana datasource)
      - "9095"   # gRPC
      - "4317"   # OTLP/gRPC (caso queira bypass do collector)
      - "4318"   # OTLP/HTTP
    restart: unless-stopped
    mem_limit: 512m
    networks: [shift-net]

# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------
volumes:
  prometheus_data:
  grafana_data:
  tempo_data:
  shift_checkpoints:
  shift_extract_cache:
  shift_uploads:
  shift_secrets:
  # streaming_spill em tmpfs — sobrevive enquanto o container vive,
  # nao toca disco. 2GB cap; spillover excessivo gera WARN no log.
  streaming_spill:
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=2g,uid=1000,gid=1000"

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
networks:
  shift-net:
    driver: bridge
    name: shift-net
