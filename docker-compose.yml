# Docker Compose principal do shift-project.
#
# Stack:
#   shift-backend       — FastAPI + APScheduler in-process (single-process,
#                         single-worker porque APScheduler nao pode rodar em
#                         multiplos workers do mesmo processo)
#   shift-frontend      — Next.js 16
#   prometheus          — metricas
#   grafana             — dashboards (provisionados de ops/grafana/)
#   otel-collector      — recebe spans OTLP do backend
#   tempo               — backend de traces, integrado no Grafana
#   kernel-runtime-builder — service one-shot que builda a imagem
#                            shift-kernel-runtime:latest, usada pela sandbox
#                            de code_node. Roda com --profile build.
#
# IMPORTANTE: nao tem Celery worker nem Celery beat. O codigo atual usa
# APScheduler in-process; webhook dispatch, cleanup de checkpoints,
# extract-cache, agent expiration — tudo registrado como job APScheduler
# no startup do FastAPI (main.py:lifespan). Para escalar horizontalmente,
# suba multiplas replicas do shift-backend — APScheduler+SQLAlchemyJobStore
# coordena via locks no Postgres (job_default_max_instances=1).
#
# Tambem nao tem Prefect — foi removido (alembic
# 2026_04_16_b8c9d0e1f2a3_drop_prefect_flow_run_id.py). Orquestracao usa
# orchestration/flows/dynamic_runner.py em asyncio puro.

name: shift

# ---------------------------------------------------------------------------
# Anchors reutilizaveis
# ---------------------------------------------------------------------------
x-backend-env: &backend-env
  # === Database (Postgres em nuvem) ===
  # DATABASE_URL e fornecido via .env. Formato esperado:
  #   postgresql+asyncpg://USER:PASS@HOST:5432/DB?sslmode=require
  # ?sslmode=require funciona para asyncpg (assincrono, runtime) E para
  # psycopg2 (sincrono, alembic) — SQLAlchemy traduz por driver.
  DATABASE_URL: ${DATABASE_URL:?DATABASE_URL obrigatorio em .env (Postgres em nuvem)}

  # === Logging ===
  LOG_FORMAT: ${LOG_FORMAT:-json}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}

  # === Auth / Crypto ===
  SECRET_KEY: ${SECRET_KEY:?SECRET_KEY obrigatorio em .env}
  ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY obrigatorio em .env (Fernet)}
  ALGORITHM: HS256
  ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}

  # === dlt ===
  DLT_DEFAULT_DESTINATION: ${DLT_DEFAULT_DESTINATION:-postgres}

  # === Email / Frontend ===
  EMAIL_BACKEND: ${EMAIL_BACKEND:-console}
  FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:3000}
  EXTERNAL_BASE_URL: ${EXTERNAL_BASE_URL:-http://localhost:8000}

  # === Tracing (OTel) ===
  SHIFT_TRACING_ENABLED: ${SHIFT_TRACING_ENABLED:-true}
  OTEL_SERVICE_NAME: shift-backend
  # Path /v1/traces e obrigatorio quando o codigo passa endpoint via
  # parametro do OTLPSpanExporter (a SDK nao auto-anexa nesse caminho).
  # Ver shift-backend/app/core/observability/tracing.py:119.
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318/v1/traces
  OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf

  # === Sandbox (Docker) ===
  SANDBOX_ENABLED: ${SANDBOX_ENABLED:-true}
  SANDBOX_IMAGE: ${SANDBOX_IMAGE:-shift-kernel-runtime:latest}
  SANDBOX_DEFAULT_CPU_QUOTA: ${SANDBOX_DEFAULT_CPU_QUOTA:-1.0}
  SANDBOX_DEFAULT_MEM_LIMIT_MB: ${SANDBOX_DEFAULT_MEM_LIMIT_MB:-512}
  SANDBOX_DEFAULT_TIMEOUT_S: ${SANDBOX_DEFAULT_TIMEOUT_S:-60}
  SANDBOX_POOL_ENABLED: ${SANDBOX_POOL_ENABLED:-true}
  SANDBOX_POOL_TARGET_IDLE: ${SANDBOX_POOL_TARGET_IDLE:-2}
  SANDBOX_POOL_MAX_SIZE: ${SANDBOX_POOL_MAX_SIZE:-8}

  # === Streaming / spill ===
  STREAMING_MAX_IN_MEMORY_CHUNKS: ${STREAMING_MAX_IN_MEMORY_CHUNKS:-4}
  STREAMING_SPILL_WHEN_EXCEEDED: ${STREAMING_SPILL_WHEN_EXCEEDED:-true}
  STREAMING_SPILL_DIR: /tmp/streaming-spill

  # === Persistencia (volumes nomeados) ===
  SHIFT_CHECKPOINT_DIR: /var/lib/shift/checkpoints
  SHIFT_EXTRACT_CACHE_DIR: /var/lib/shift/extract-cache
  WORKFLOW_UPLOAD_DIR: /var/lib/shift/uploads

  # === LLM / Agent ===
  LLM_MODEL: ${LLM_MODEL:-anthropic/claude-sonnet-4-20250514}
  LLM_API_KEY: ${LLM_API_KEY:-}
  AGENT_ENABLED: ${AGENT_ENABLED:-false}
  AGENT_LLM_MODEL: ${AGENT_LLM_MODEL:-anthropic/claude-sonnet-4-20250514}

  # === Google OAuth ===
  GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}

  # === LangSmith (opcional) ===
  LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
  LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
  LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-shift-platform-agent}

  # === Email (Resend, opcional) ===
  RESEND_API_KEY: ${RESEND_API_KEY:-}
  EMAIL_FROM: ${EMAIL_FROM:-noreply@shift.app}

# ---------------------------------------------------------------------------
# Services
# ---------------------------------------------------------------------------
services:

  # =========================================================================
  # kernel-runtime-builder — one-shot. Build da imagem da sandbox.
  # Use: docker compose --profile build build kernel-runtime-builder
  # =========================================================================
  kernel-runtime-builder:
    profiles: ["build"]
    build:
      context: ./kernel-runtime
      dockerfile: Dockerfile
    image: ${SANDBOX_IMAGE:-shift-kernel-runtime:latest}
    # Servico nao roda — so existe para o Compose buildar a imagem com
    # o nome exato que o backend espera em SANDBOX_IMAGE.
    entrypoint: ["true"]
    restart: "no"

  # =========================================================================
  # shift-backend — FastAPI + APScheduler in-process
  # =========================================================================
  shift-backend:
    build:
      context: ./shift-backend
      dockerfile: Dockerfile
    image: shift-backend:latest
    depends_on:
      otel-collector:
        condition: service_started
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      <<: *backend-env
    volumes:
      # Sandbox precisa do socket Docker — mount read-write porque
      # docker-py cria/destroi containers. Em prod-real, trocar por
      # Sysbox/gVisor/Kata. Documentado no README-DEPLOY.
      - /var/run/docker.sock:/var/run/docker.sock
      # Persistencia da plataforma
      - shift_checkpoints:/var/lib/shift/checkpoints
      - shift_extract_cache:/var/lib/shift/extract-cache
      - shift_uploads:/var/lib/shift/uploads
      # Spill de streaming — tmpfs para nao tocar disco
      - streaming_spill:/tmp/streaming-spill
    # GID do grupo dono do docker.sock no host. No Linux/WSL2 tipicamente
    # 999 (Debian/Ubuntu). Override em .env via DOCKER_GID se diferente.
    group_add:
      - "${DOCKER_GID:-999}"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      # Pre-warm de 2 sandboxes leva ~10s, migrations alembic mais alguns.
      start_period: 60s
    restart: unless-stopped
    mem_limit: 2g
    networks: [shift-net]

  # =========================================================================
  # shift-frontend — Next.js 16
  # =========================================================================
  shift-frontend:
    build:
      context: ./shift-frontend
      dockerfile: Dockerfile
      args:
        # Burned no build (NEXT_PUBLIC_*). Trocar antes do build em prod.
        # IMPORTANTE: o codigo do frontend usa NEXT_PUBLIC_API_BASE_URL
        # com sufixo /api/v1 — ver shift-frontend/lib/auth.ts e similares.
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
    image: shift-frontend:latest
    depends_on:
      shift-backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
    restart: unless-stopped
    mem_limit: 512m
    networks: [shift-net]

  # =========================================================================
  # Prometheus — scrape de /metrics do backend + alertas
  # =========================================================================
  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
      - --web.enable-remote-write-receiver
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./ops/alerts:/etc/prometheus/alerts:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    mem_limit: 512m
    networks: [shift-net]

  # =========================================================================
  # Grafana — dashboards e UI de Tempo/Prometheus
  # =========================================================================
  grafana:
    image: grafana/grafana:11.3.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_INSTALL_PLUGINS: ""
      # Habilita features de tracing/exemplars que dependem de feature flags.
      GF_FEATURE_TOGGLES_ENABLE: "traceqlEditor,traceToProfiles"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/grafana/dashboards:/etc/grafana/dashboards:ro
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    mem_limit: 384m
    networks: [shift-net]

  # =========================================================================
  # OTel Collector — recebe traces do backend, exporta pro Tempo
  # =========================================================================
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.112.0
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./ops/otel-collector/otel-collector-config.yml:/etc/otelcol-contrib/config.yaml:ro
    # Portas:
    #   4317 OTLP/gRPC, 4318 OTLP/HTTP, 8888 metrics do collector
    # NAO exponho pra host — backend acessa via DNS interno do compose.
    expose:
      - "4317"
      - "4318"
      - "8888"
    depends_on:
      tempo:
        condition: service_started
    restart: unless-stopped
    mem_limit: 384m
    networks: [shift-net]

  # =========================================================================
  # Tempo — backend de traces (storage local, retencao 24h)
  # =========================================================================
  tempo:
    image: grafana/tempo:2.6.1
    command: ["-config.file=/etc/tempo.yml"]
    volumes:
      - ./ops/tempo/tempo.yml:/etc/tempo.yml:ro
      - tempo_data:/var/tempo
    expose:
      - "3200"   # HTTP API (Grafana datasource)
      - "9095"   # gRPC
      - "4317"   # OTLP/gRPC (caso queira bypass do collector)
      - "4318"   # OTLP/HTTP
    restart: unless-stopped
    mem_limit: 512m
    networks: [shift-net]

# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------
volumes:
  prometheus_data:
  grafana_data:
  tempo_data:
  shift_checkpoints:
  shift_extract_cache:
  shift_uploads:
  # streaming_spill em tmpfs — sobrevive enquanto o container vive,
  # nao toca disco. 2GB cap; spillover excessivo gera WARN no log.
  streaming_spill:
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=2g,uid=1000,gid=1000"

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
networks:
  shift-net:
    driver: bridge
    name: shift-net
